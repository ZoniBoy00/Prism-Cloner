name: Prism Cloner

on:
  workflow_dispatch:

jobs:
  run-prism:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Prism Cloner
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DC_TOKEN: ${{ secrets.DC_TOKEN }}
          ALLOWED_ID: ${{ secrets.ALLOWED_ID }}
        run: node index.js
